<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイページ — DEARS</title>
  <link rel="stylesheet" href="style.css?v=5" />
  <style>
    .mypage-wrap { max-width: 720px; }
    .mypage-hero {
      display: flex; align-items: center; gap: 20px;
      background: var(--surface-2); border: 1px solid var(--border-mid);
      border-radius: 12px; padding: 24px 28px; margin-bottom: 24px;
    }
    .mypage-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; flex-shrink: 0;
    }
    .mypage-name { font-size: 20px; font-weight: 700; color: var(--text-1); }
    .mypage-meta { font-size: 13px; color: var(--text-3); margin-top: 4px; }
    .mypage-role-badge {
      display: inline-block; background: #1d4ed8; color: #fff;
      border-radius: 4px; font-size: 11px; font-weight: 600;
      padding: 2px 8px; margin-top: 6px;
    }
    .mypage-section { margin-bottom: 20px; }
    .mypage-section-title {
      font-size: 12px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .mypage-rows { background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: 10px; overflow: hidden; }
    .mypage-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .mypage-row:last-child { border-bottom: none; }
    .mypage-row-label { color: var(--text-3); flex-shrink: 0; width: 140px; }
    .mypage-row-val { color: var(--text-1); font-weight: 500; }
    .mypage-row-action { margin-left: auto; }
    .perm-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .perm-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border: 1px solid var(--border-mid);
      border-radius: 8px; padding: 12px 14px; font-size: 13px;
    }
    .perm-check { font-size: 16px; }
    .perm-item-label { color: var(--text-2); }
    .logout-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 14px 18px;
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: var(--red); text-align: left;
    }
    .logout-btn:hover { background: rgba(239,68,68,.06); }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">マイページ</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-date">2025年5月</div>
      </div>
    </header>

    <div class="page-content">
      <div class="mypage-wrap">

        <!-- プロフィール -->
        <div class="mypage-hero">
          <div class="mypage-avatar">本</div>
          <div>
            <div class="mypage-name">本部 管理者</div>
            <div class="mypage-meta">honbu@dears.co.jp</div>
            <div class="mypage-role-badge">Admin — 全権限</div>
          </div>
        </div>

        <!-- アカウント情報 -->
        <div class="mypage-section">
          <div class="mypage-section-title">アカウント情報</div>
          <div class="mypage-rows">
            <div class="mypage-row">
              <span class="mypage-row-label">氏名</span>
              <span class="mypage-row-val">本部 管理者</span>
              <span class="mypage-row-action"><button class="btn-xs">変更</button></span>
            </div>
            <div class="mypage-row">
              <span class="mypage-row-label">メールアドレス</span>
              <span class="mypage-row-val">honbu@dears.co.jp</span>
              <span class="mypage-row-action"><button class="btn-xs">変更</button></span>
            </div>
            <div class="mypage-row">
              <span class="mypage-row-label">パスワード</span>
              <span class="mypage-row-val" style="color:var(--text-3)">••••••••••</span>
              <span class="mypage-row-action"><button class="btn-xs">変更</button></span>
            </div>
            <div class="mypage-row">
              <span class="mypage-row-label">ロール</span>
              <span class="mypage-row-val"><span class="role-badge role-admin">admin</span></span>
            </div>
            <div class="mypage-row">
              <span class="mypage-row-label">所属</span>
              <span class="mypage-row-val">本部（全店舗管理）</span>
            </div>
            <div class="mypage-row">
              <span class="mypage-row-label">最終ログイン</span>
              <span class="mypage-row-val" style="color:var(--text-3)">2025年5月31日 09:12</span>
            </div>
          </div>
        </div>

        <!-- アクセス権限 -->
        <div class="mypage-section">
          <div class="mypage-section-title">アクセス権限</div>
          <div class="perm-grid">
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">全店舗データ閲覧</span></div>
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">予算設定・編集</span></div>
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">アカウント管理</span></div>
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">店舗マスタ編集</span></div>
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">月次データ承認</span></div>
            <div class="perm-item"><span class="perm-check">✓</span><span class="perm-item-label">請求データ確認</span></div>
          </div>
        </div>

        <!-- ログアウト -->
        <div class="mypage-section">
          <div class="mypage-section-title">セッション</div>
          <div class="mypage-rows">
            <button class="logout-btn" onclick="location.href='login.html'">
              ← ログアウト
            </button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="shared.js?v=5"></script>
  <script>renderSidebar('mypage');</script>
</body>
</html>
