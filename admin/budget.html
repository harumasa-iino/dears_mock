<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予算管理 — DEARS</title>
  <link rel="stylesheet" href="../style.css?v=5" />
  <style>
    .page-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border-mid);
      margin-bottom: 20px;
    }
    .page-tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-3);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color .15s;
    }
    .page-tab:hover { color: var(--text-1); }
    .page-tab.active {
      color: var(--accent);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .carryover-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600;
    }
    .carryover-row { background: #fffbeb !important; }
    .carryover-note {
      font-size: 11px; color: #92400e;
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .last-updated-cell { font-size: 11px; line-height: 1.5; }
    .last-updated-dt   { color: var(--text-2); font-weight: 500; }
    .last-updated-who  { color: var(--text-3); }

    .access-denied {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 400px; gap: 16px; text-align: center;
    }
    .access-denied-icon { font-size: 48px; }
    .access-denied-title { font-size: 20px; font-weight: 700; color: var(--text-1); }
    .access-denied-desc  { font-size: 14px; color: var(--text-3); max-width: 360px; }

    .readonly-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface-3); color: var(--text-3);
      border: 1px solid var(--border-mid);
      border-radius: 4px; padding: 2px 8px; font-size: 11px;
    }

    /* ===== モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #fff; border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      width: 100%; max-width: 680px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-mid);
    }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text-1); }
    .modal-close {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: var(--text-3); line-height: 1; padding: 2px 6px;
    }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-mid); display: flex; gap: 8px; justify-content: flex-end; }

    /* 変更履歴テーブル */
    .history-badge-up   { background: #dcfce7; color: #15803d; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .history-badge-down { background: #fee2e2; color: #b91c1c; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .history-badge-new  { background: #eff6ff; color: #1d4ed8; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; }

    /* Webhook設定 */
    .webhook-section { margin-bottom: 20px; }
    .webhook-section-title { font-size: 13px; font-weight: 700; color: var(--text-2); margin-bottom: 10px; }
    .webhook-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .webhook-label { font-size: 12px; color: var(--text-3); min-width: 160px; }
    .webhook-val { font-family: monospace; font-size: 12px; background: var(--surface-3); border: 1px solid var(--border-mid); border-radius: 6px; padding: 5px 10px; flex: 1; color: var(--text-2); }
    .secret-mask { letter-spacing: 3px; }

    /* API反映ステータス */
    .api-reflect-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface-2); border-radius: 8px; margin-bottom: 6px; }
    .api-reflect-store { font-size: 13px; font-weight: 600; flex: 1; }
    .api-reflect-note  { font-size: 11px; color: var(--text-3); }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">予算管理</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-date">2025年5月</div>
      </div>

    <div class="page-content" id="pageContent">
      <!-- コンテンツはスクリプトで描画 -->

  <script src="shared.js?v=7"></script>
  <script>
    renderSidebar('budget');
