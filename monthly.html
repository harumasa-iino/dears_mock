<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月次データ確認 — DEARS</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div id="sidebar-mount"></div>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">月次データ確認・修正</h1></div>
      <div class="topbar-right"><div class="topbar-date">2025年5月</div></div>
    </header>
    <div class="page-content">
      <div class="filter-bar">
        <div class="filter-group">
          <label>対象月</label>
          <select class="select-input"><option>2025年5月</option><option>2025年4月</option></select>
        </div>
        <div class="filter-group">
          <label>ステータス</label>
          <select class="select-input"><option>全て</option><option>確認待ち</option><option>未入力</option><option>確定済み</option></select>
        </div>
        <div class="filter-spacer"></div>
        <button class="btn-primary">適用</button>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">月次データ一覧 — 2025年5月</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>店舗名</th><th>区分</th><th>入力者</th>
                <th class="col-num">技術売上</th><th class="col-num">物販売上</th>
                <th class="col-num">来店客数</th><th class="col-num">稼働率</th>
                <th>入力日</th><th>ステータス</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>表参道店</strong></td><td><span class="tag tag-direct">直営</span></td>
                <td>田中 花子</td>
                <td class="col-num">3,210</td><td class="col-num">630</td>
                <td class="col-num">300</td><td class="col-num">84.2%</td>
                <td>5/31</td><td><span class="status-badge status-active">確定済み</span></td>
                <td><button class="btn-xs">修正</button></td>
              </tr>
              <tr>
                <td><strong>大阪梅田店</strong></td><td><span class="tag tag-fc">FC</span></td>
                <td>山田 太郎</td>
                <td class="col-num">2,240</td><td class="col-num">440</td>
                <td class="col-num">244</td><td class="col-num">70.1%</td>
                <td>5/29</td><td><span class="status-badge status-pending">確認待ち</span></td>
                <td><button class="btn-xs">確認・承認</button></td>
              </tr>
              <tr class="row-warn">
                <td><strong>札幌大通店</strong></td><td><span class="tag tag-fc">FC</span></td>
                <td style="color:var(--text-3)">—</td>
                <td class="col-num" style="color:var(--text-3)">—</td>
                <td class="col-num" style="color:var(--text-3)">—</td>
                <td class="col-num" style="color:var(--text-3)">—</td>
                <td class="col-num" style="color:var(--text-3)">—</td>
                <td style="color:var(--red)">未入力</td>
                <td><span class="status-badge status-inactive">未入力</span></td>
                <td><button class="btn-xs btn-xs-danger">督促</button></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="table-note">※ 金額単位：千円</div>
      </div>
    </div>
  </main>
  <script src="shared.js?v=3"></script>
  <script>renderSidebar('monthly');</script>
</body>
</html>
