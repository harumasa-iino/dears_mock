<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日次入力 — DEARS</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .form-card {
      background: var(--surface-1);
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      max-width: 640px;
    }
    .form-card-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .form-card-section:last-child { border-bottom: none; }
    .form-section-title {
      font-size: 12px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 14px;
    }
    .form-row { margin-bottom: 14px; }
    .form-row:last-child { margin-bottom: 0; }
    .form-label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-2); margin-bottom: 6px;
    }
    .form-required { color: var(--red); margin-left: 3px; }
    .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    .form-input, .form-select {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border-mid);
      border-radius: 7px; font-size: 14px; background: var(--bg);
      color: var(--text-1); outline: none; box-sizing: border-box;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .form-textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border-mid);
      border-radius: 7px; font-size: 13px; background: var(--bg);
      color: var(--text-1); outline: none; resize: vertical; min-height: 80px;
      box-sizing: border-box; font-family: inherit;
    }
    .form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .input-suffix { display: flex; align-items: center; gap: 8px; }
    .input-suffix .form-input { flex: 1; }
    .suffix-label { font-size: 13px; color: var(--text-3); white-space: nowrap; }
    .daily-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .daily-cell label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; }
    .form-success-card {
      background: #ecfdf5; border: 1px solid #a7f3d0;
      border-radius: 12px; padding: 32px 24px; text-align: center;
      max-width: 640px; display: none;
    }
    .form-success-icon { font-size: 40px; margin-bottom: 12px; }
    .form-success-title { font-size: 18px; font-weight: 700; color: #047857; margin-bottom: 6px; }
    .form-success-sub { font-size: 13px; color: #065f46; }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">日次入力</h1></div>
      <div class="topbar-right"><div class="topbar-date" id="todayLabel"></div></div>
    </header>
    <div class="page-content">

      <div class="account-card" style="max-width:640px;margin-bottom:16px;">
        <div class="account-avatar">田</div>
        <div class="account-info">
          <div class="account-name">田中 花子</div>
          <div class="account-meta">
            <span class="account-meta-item">🏪 大阪梅田店</span>
            <span class="account-meta-item">👤 スタイリスト</span>
          </div>
        </div>
      </div>

      <div id="formBody">
        <div class="form-card">

          <!-- 入力日 -->
          <div class="form-card-section">
            <div class="form-section-title">入力日</div>
            <div class="form-row">
              <label class="form-label">対象日<span class="form-required">*</span></label>
              <input type="date" class="form-input" id="inputDate" style="max-width:200px;" />
            </div>
          </div>

          <!-- 売上 -->
          <div class="form-card-section">
            <div class="form-section-title">売上</div>
            <div class="form-row">
              <label class="form-label">技術売上<span class="form-required">*</span></label>
              <div class="input-suffix">
                <input type="number" class="form-input" placeholder="0" min="0" />
                <span class="suffix-label">円</span>
              </div>
              <div class="form-hint">カット・カラー・パーマ等の施術売上</div>
            </div>
            <div class="form-row">
              <label class="form-label">物販売上</label>
              <div class="input-suffix">
                <input type="number" class="form-input" placeholder="0" min="0" />
                <span class="suffix-label">円</span>
              </div>
              <div class="form-hint">シャンプー・トリートメント等（なければ0）</div>
            </div>
          </div>

          <!-- 予約・客数 -->
          <div class="form-card-section">
            <div class="form-section-title">予約・客数</div>
            <div class="daily-grid">
              <div class="daily-cell">
                <label>予約件数<span class="form-required">*</span></label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
              <div class="daily-cell">
                <label>来店客数<span class="form-required">*</span></label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
              <div class="daily-cell">
                <label>稼働スタイリスト数</label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
              <div class="daily-cell">
                <label>総予約枠数</label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
              <div class="daily-cell">
                <label>新規客数</label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
              <div class="daily-cell">
                <label>リピート客数</label>
                <input type="number" class="form-input" placeholder="0" min="0" />
              </div>
            </div>
          </div>

          <!-- 備考 -->
          <div class="form-card-section">
            <div class="form-section-title">備考</div>
            <div class="form-row">
              <label class="form-label">特記事項</label>
              <textarea class="form-textarea" placeholder="イベント・臨時休業・人員変更など特記事項があれば記入"></textarea>
            </div>
          </div>

          <!-- 送信 -->
          <div class="form-card-section" style="background:var(--surface-2);">
            <div style="display:flex;align-items:center;gap:12px;">
              <button class="btn-primary" onclick="submitForm()" style="padding:10px 28px;font-size:14px;">送信する</button>
              <span style="font-size:12px;color:var(--text-3);">大阪梅田店 / 田中 花子 として送信されます</span>
            </div>
          </div>

        </div>
      </div>

      <div class="form-success-card" id="successCard">
        <div class="form-success-icon">✅</div>
        <div class="form-success-title">送信完了しました！</div>
        <div class="form-success-sub">入力内容はPL画面に反映されます。お疲れ様でした。</div>
        <button onclick="resetForm()" class="btn-ghost" style="margin-top:20px;">続けて入力する</button>
      </div>

    </div>
  </main>

  <script src="shared.js"></script>
  <script>
    renderStoreSidebar('daily');
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('todayLabel').textContent =
      new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });

    function submitForm() {
      document.getElementById('formBody').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
    }
    function resetForm() {
      document.getElementById('formBody').style.display = 'block';
      document.getElementById('successCard').style.display = 'none';
    }
  </script>
</body>
</html>
